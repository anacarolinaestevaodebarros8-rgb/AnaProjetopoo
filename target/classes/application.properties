# ══════════════════════════════════════════════════════
#  Folhear — application.properties
#  Substitua os placeholders pelas suas credenciais Supabase
# ══════════════════════════════════════════════════════

spring.application.name=folhear

# ─── DataSource (Supabase PostgreSQL via JDBC) ─────────
# Formato: jdbc:postgresql://<host>:<porta>/<database>
# Host Supabase: aws-0-<região>.pooler.supabase.com (porta 5432 ou 6543 pooler)
# DESCOMENTE QUANDO TIVER CREDENCIAIS REAIS
#spring.datasource.url=jdbc:postgresql://aws-0-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require
#spring.datasource.username=${SUPABASE_DB_USER:postgres}
#spring.datasource.password=${SUPABASE_DB_PASSWORD:sua_senha_aqui}
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── HikariCP (pool de conexões) ───────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=FolhearPool

# ─── Spring Data JPA / Hibernate ───────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
# use "update" durante desenvolvimento; "validate" ou "none" em produção
# Para criar as tabelas automaticamente pela primeira vez: create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ─── Servidor ──────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ─── Actuator ──────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ─── Jackson ───────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
