# ══════════════════════════════════════════════════════
#  Folhear — application.properties
#  Configuração local para desenvolvimento
# ══════════════════════════════════════════════════════

spring.application.name=folhear

# ─── DataSource (H2 local, sem dependência externa) ─────────
spring.datasource.url=${DB_URL:jdbc:h2:mem:folhear;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.h2.Driver}

# ─── HikariCP (pool de conexões) ───────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=FolhearPool

# ─── Spring Data JPA / Hibernate ───────────────────────
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Servidor ──────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ─── Actuator ──────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ─── Supabase (opcional, apenas para integrações futuras) ───────────────────────
supabase.url=${SUPABASE_URL:https://xpwxludndcxplubcpzwg.supabase.co}
supabase.key=${SUPABASE_KEY:dummy}
supabase.service-key=${SUPABASE_SERVICE_KEY:dummy}

# ─── Jackson ───────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC