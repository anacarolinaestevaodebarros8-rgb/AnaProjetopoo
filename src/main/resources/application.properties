# ============================================================
#  Folhear - application.properties
# ============================================================

# ----- Supabase / PostgreSQL --------------------------------
# Substitua <DB_PASSWORD> pela senha do banco no painel Supabase
# Settings > Database > Connection string (modo "JDBC")
spring.datasource.url=jdbc:postgresql://db.xpwxludndcxplubcpzwg.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ----- JPA / Hibernate --------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# validate = não altera o schema; use create-drop só em dev local
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=public

# ----- Supabase REST API (PostgREST) ------------------------
supabase.url=https://xpwxludndcxplubcpzwg.supabase.co
supabase.key=${SUPABASE_ANON_KEY}
supabase.service-key=${SUPABASE_SERVICE_KEY}

# ----- JWT (mesmo secret que o Supabase usa) ----------------
jwt.secret=${SUPABASE_JWT_SECRET}
jwt.expiration=86400000

# ----- Servidor ---------------------------------------------
server.port=8080
spring.application.name=folhear-api